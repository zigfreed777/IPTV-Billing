{% extends 'admin/base.html' %}
{% block title %}Чат — {{ user.login }}{% endblock %}
{% block content %}
<a href="/admin/chat" style="color:var(--text3);font-size:13px">← Все диалоги</a>
<div class="page-title animate" style="margin-top:8px">💬 {{ user.login }}</div>
<div class="card animate" style="display:flex;flex-direction:column;height:calc(100vh - 240px);min-height:480px">
  <div class="card-glow"></div>
  <div id="chat-msgs" style="flex:1;overflow-y:auto;padding:4px 0 16px;display:flex;flex-direction:column;gap:10px">
    {% for m in messages %}
    <div class="chat-msg {% if m.from_admin %}chat-msg-out{% else %}chat-msg-in{% endif %}">
      <div class="chat-bubble">{{ m.body }}</div>
      <div class="chat-meta">{% if m.from_admin %}Вы · {% endif %}{{ (m.created_at or '')[:16] }}</div>
    </div>
    {% endfor %}
  </div>
  <div style="border-top:1px solid var(--border);padding-top:14px;flex-shrink:0">
    <form method="POST" style="display:flex;gap:10px;align-items:flex-end">
      <input type="hidden" name="_csrf" value="{{ csrf }}">
      <textarea name="body" rows="2" placeholder="Ответить {{ user.login }}..."
                style="flex:1;resize:none;min-height:42px;max-height:120px" maxlength="2000" required></textarea>
      <button type="submit" class="btn btn-primary" style="flex-shrink:0;align-self:flex-end">Отправить</button>
    </form>
  </div>
</div>
<style>
.chat-msg{display:flex;flex-direction:column;max-width:72%}
.chat-msg-in{align-self:flex-start;align-items:flex-start}
.chat-msg-out{align-self:flex-end;align-items:flex-end}
.chat-bubble{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.55;word-break:break-word;white-space:pre-wrap}
.chat-msg-in  .chat-bubble{background:var(--surface3);border-bottom-left-radius:4px}
.chat-msg-out .chat-bubble{background:linear-gradient(135deg,var(--primary),#3B82F6);color:#fff;border-bottom-right-radius:4px}
.chat-meta{font-size:11px;color:var(--text3);margin-top:3px;padding:0 4px}
</style>
<script>
document.getElementById('chat-msgs').scrollTop = 99999
const ta = document.querySelector('textarea[name="body"]')
if(ta) ta.addEventListener('keydown', e => {
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ta.closest('form').submit()}
})
</script>
{% endblock %}
