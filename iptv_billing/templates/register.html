{% extends 'base.html' %}
{% block title %}Регистрация — IPTV Billing{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card animate">
    <div class="auth-brand">
      <div class="auth-brand-icon">🚀</div>
      <h1>Регистрация</h1>
      <p>Создайте аккаунт и смотрите TV</p>
    </div>
    <form method="POST" autocomplete="on">
      <input type="hidden" name="_csrf" value="{{ csrf }}">
      <div class="form-group">
        <label class="form-label">Логин</label>
        <div class="input-wrap has-icon">
          <span class="input-icon">👤</span>
          <input type="text" name="login" placeholder="my_username" required
                 pattern="[a-zA-Z0-9_]{4,32}" title="4-32 символа: буквы, цифры, _"
                 autocomplete="username">
        </div>
        <div class="form-hint">4-32 символа, только буквы, цифры и _</div>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="input-wrap has-icon">
          <span class="input-icon">✉️</span>
          <input type="email" name="email" placeholder="you@example.com"
                 required autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <div class="input-wrap has-icon">
          <span class="input-icon">🔒</span>
          <input type="password" name="password" id="password" placeholder="минимум 6 символов"
                 required minlength="6" autocomplete="new-password">
        </div>
        <div class="pwd-meter"><div class="pwd-meter-bar"></div></div>
      </div>
      <div class="form-group">
        <label class="form-label">Повторите пароль</label>
        <div class="input-wrap has-icon">
          <span class="input-icon">🔒</span>
          <input type="password" name="confirm" placeholder="повторите пароль"
                 required autocomplete="new-password">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Реферальный код <span>(необязательно)</span></label>
        <div class="input-wrap has-icon">
          <span class="input-icon">🎁</span>
          <input type="text" name="ref_code" value="{{ ref_code or '' }}"
                 placeholder="XXXXXXXX" style="text-transform:uppercase">
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Создать аккаунт</button>
    </form>
    <div class="auth-footer">
      Уже зарегистрированы? <a href="/login">Войти</a>
    </div>
  </div>
</div>
{% endblock %}
